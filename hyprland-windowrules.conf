# Optional Hyprland window rule for quickshell-stickynotes.
#
# This is NOT auto-included by install.sh — it intentionally never touches
# your hyprland.conf. Wire it in yourself with one line, e.g.:
#
#   source = ~/.config/quickshell-stickynotes/hyprland-windowrules.conf
#
# (or copy the line below directly into hyprland.conf).
#
# Keeps the Notes Manager window floating instead of getting tiled like a
# normal window. Every quickshell-based shell on this system currently
# reports the same window class (dev.noctalia.noctalia-qs), so this matches
# on title instead to avoid floating unrelated quickshell windows.
#
# Syntax below is for Hyprland >= 0.53 (the old `windowrulev2 = float, ...`
# form was removed). If `hyprctl configerrors` complains after adding this,
# check https://wiki.hypr.land/Configuring/Basics/Window-Rules/ for your
# version's current grammar.

windowrule = float 1, match:title ^(Sticky Notes Manager)$
